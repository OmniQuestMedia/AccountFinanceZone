services:
  app:
    build: .
    command: npm run start:dev
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/accounts_finance_zone
      REDIS_URL: redis://redis:6379
      COMPLIANCE_ZONE_URL: http://omni-compliance-zone:4000
      DATA_RESIDENCY_REGION: ca-central-1
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: accounts_finance_zone
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - '6379:6379'
volumes:
  postgres_data:

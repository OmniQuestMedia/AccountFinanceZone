name: ship-gate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ship-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ship gate verifier
        env:
          SHIP_GATE_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || '' }}
          SHIP_GATE_HEAD_SHA: ${{ github.sha }}
        run: npm run ship-gate
